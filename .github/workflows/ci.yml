name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Version comes from package.json's "packageManager" field — do not also pass
      # `version:` here; action-setup refuses when told twice.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Start Azurite (azure-driver test leg)
        run: npx --yes azurite --silent --skipApiVersionCheck --location .azurite &

      - name: Typecheck
        run: pnpm -r --if-present check

      - name: Test
        run: pnpm -r --if-present test

      - name: Build
        run: pnpm --filter @stela/app build
